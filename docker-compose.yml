version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lightit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lightit_db
      POSTGRES_USER: lightit
      POSTGRES_PASSWORD: lightit_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightit -d lightit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lightit_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass lightit_redis_pass
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (Express) ─────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lightit_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://lightit:lightit_secret@postgres:5432/lightit_db?schema=public
      REDIS_URL: redis://:lightit_redis_pass@redis:6379
    env_file:
      - ./apps/api/.env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  # ─── Web (Next.js) ─────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: lightit_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000/api
      NEXT_PUBLIC_SOCKET_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ─── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lightit_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: lightit_network
